<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | NexusAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --primary: #6366f1;
            --text: #94a3b8;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 2rem;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 2rem;
            color: var(--primary);
            filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.4));
        }
        h1 {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        p {
            color: var(--text);
            font-size: 0.875rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .btn {
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            transition: all 0.2s;
            display: inline-block;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⚡</div>
        <h1>You're Offline</h1>
        <p>NexusAI is currently disconnected. Some features may be limited, but your focus shouldn't be. Check your connection or try again later.</p>
        <a href="/" class="btn">Try Again</a>
    </div>
</body>
</html>
